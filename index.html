<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #1a0b2e, #09050f);
  font-family: -apple-system;
}

#counter {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  letter-spacing: 3px;
}

.dot {
  position: absolute;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 20px rgba(255,255,255,0.4);
}

#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  backdrop-filter: blur(15px);
  justify-content:center;
  align-items:center;
}

.card {
  width:80%;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  color:white;
  text-align:center;
}
button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#fff2;
  color:white;
}
</style>
</head>

<body>

<div id="counter">20 / 20 ready</div>

<div id="modal">
  <div class="card">
    <div id="msg"></div>
    <button onclick="send()">SEND</button>
  </div>
</div>

<script>
let dots = [];
let available = 20;

for(let i=0;i<20;i++){
  let d=document.createElement("div");
  let size=Math.random()*4+3;

  d.className="dot";
  d.style.width=size+"px";
  d.style.height=size+"px";

  d.x=Math.random()*window.innerWidth;
  d.y=Math.random()*window.innerHeight;

  d.tx=Math.random()*window.innerWidth;
  d.ty=Math.random()*window.innerHeight;

  d.msg="Tâm tư số "+(i+1);

  d.style.left=d.x+"px";
  d.style.top=d.y+"px";

  d.onclick=()=>open(d);

  document.body.appendChild(d);
  dots.push(d);
}

function animate(){
  dots.forEach(d=>{
    d.x+=(d.tx-d.x)*0.01;
    d.y+=(d.ty-d.y)*0.01;

    if(Math.abs(d.x-d.tx)<1){
      d.tx=Math.random()*window.innerWidth;
      d.ty=Math.random()*window.innerHeight;
    }

    d.style.left=d.x+"px";
    d.style.top=d.y+"px";
  });

  requestAnimationFrame(animate);
}
animate();

let current=null;

function open(d){
  current=d;
  document.getElementById("msg").innerText=d.msg;
  document.getElementById("modal").style.display="flex";
}

function send(){
  if(current){
    current.remove();
    available--;
    document.getElementById("counter").innerText = available + " / 20 ready";
  }
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
